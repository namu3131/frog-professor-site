  <style>

<body>

  <header>
    <div class="container header-inner">
      <a class="back-btn" href="/">← 메인으로</a>
      <span class="page-title">사무소 리스트</span>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="section-header">
        <div class="eyebrow">Directory</div>
        <h1 class="section-title">사무소 목록</h1>
        <span class="count-badge" id="countBadge">불러오는 중...</span>
      </div>

      <div id="cardContainer">
        <div class="loading">⏳ 데이터를 불러오는 중입니다...</div>
      </div>
    </div>
  </main>

  <script>
    // 데이터 소스 목록 — 새 자격자 추가 시 여기에만 추가하면 됨
    const SOURCES = [
      {
        name: "노무사",
        url: "https://docs.google.com/spreadsheets/d/1OE8jCRvXbSOc80DXDCvVK85fbtyL3VQJ4o1JxbqIIno/export?format=csv&gid=1054349307",
        map: (c) => ({
          type: "노무사",
          office: c[1] || "",
          member: c[2] || "",
          phone: c[3] || "",
          address: c[4] || ""
        })
      },
      {
        name: "세무사",
        url: "https://docs.google.com/spreadsheets/d/18hrcKM1A_4gUlRwOAxsnzHbePnaz5_ycB9PegE8VxvA/export?format=csv&gid=331385308",
        map: (c) => ({
          type: "세무사",
          office: "",
          member: c[1] || "",
          phone: c[2] || "",
          address: c[0] || ""
        })
      }
    ];

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      return lines.slice(1).map(line => {
        const cols = [];
        let current = "";
        let inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuote = !inQuote;
          } else if (ch === "," && !inQuote) {
            cols.push(current.trim());
            current = "";
          } else {
            current += ch;
          }
        }
        cols.push(current.trim());
        return cols;
      });
    }

    const TYPE_COLOR = {
      "노무사": "#2d6a4f",
      "세무사": "#1d4ed8"
    };

    async function loadData() {
      const container = document.getElementById("cardContainer");
      const countBadge = document.getElementById("countBadge");

      try {
        // 모든 소스 동시에 fetch
        const results = await Promise.all(
          SOURCES.map(async (source) => {
            const res = await fetch(source.url);
            const text = await res.text();
            return parseCSV(text)
              .filter(r => r[0] && r[1])
              .map(source.map);
          })
        );

        // 전체 합치기
        const merged = results.flat();

        if (merged.length === 0) {
          container.innerHTML = "<div class='error'>데이터가 없습니다.</div>";
          return;
        }

        // 랜덤 20개 선택
        const shuffled = [...merged].sort(() => Math.random() - 0.5).slice(0, 20);
        countBadge.textContent = `총 ${merged.length}개 중 20개 표시`;

        container.innerHTML = `<div class="cards-grid">${shuffled.map(item => `
          <div class="card">
            <div style="margin-bottom:8px;">
              <span style="
                display:inline-block;
                padding:3px 10px;
                border-radius:999px;
                font-size:12px;
                font-weight:700;
                color:white;
                background:${TYPE_COLOR[item.type] || "#555"};
              ">${item.type}</span>
            </div>
            <div class="card-name">${item.member}</div>
            <div class="card-member">${item.office}</div>
            <hr class="card-divider">
            <div class="card-info">
              ${item.phone ? `<div class="card-info-item"><span class="card-info-icon">📞</span><span class="card-info-text">${item.phone}</span></div>` : ""}
              ${item.address ? `<div class="card-info-item"><span class="card-info-icon">📍</span><span class="card-info-text">${item.address}</span></div>` : ""}
            </div>
          </div>
        `).join("")}</div>`;

      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="error">
            <p>데이터를 불러올 수 없습니다.</p>
            <button class="refresh-btn" onclick="loadData()">🔄 다시 시도</button>
          </div>
        `;
        countBadge.textContent = "오류 발생";
      }
    }

    loadData();
  </script>

</body>
